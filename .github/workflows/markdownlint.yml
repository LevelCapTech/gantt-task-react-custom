name: markdownlint

on:
  pull_request:
    paths:
      - "docs/**/*.md"
      - ".github/**/*.md"
  push:
    paths:
      - "docs/**/*.md"
      - ".github/**/*.md"

jobs:
  markdownlint:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install tools
        run: |
          npm install -g markdownlint-cli@0.48.0

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: v0.21.0

      - name: Markdown lint
        run: |
          markdownlint "docs/**/*.md" ".github/**/*.md" \
            | reviewdog \
              -f=markdownlint \
              -name="Markdownチェック" \
              -reporter=github-pr-review \
              -level=warning
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
